name: Build & Push User

on:
  push:
    branches:
      - main
env:
  PROJECT_ID: bulq-testing-487417
  REGION: us-central1
  REPOSITORY: cloud-run-source-deploy
  IMAGE: bulq_user/bulq-user
  SERVICE_NAME: bulq-user

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.image.outputs.image }}   # pass full image ref to deploy job

    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/293105510394/locations/global/workloadIdentityPools/github-pool/providers/github-actions-provider'
          service_account: 'github-ci@bulq-testing-487417.iam.gserviceaccount.com'

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest \
            .

      - name: Push
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest

      # Expose the sha-tagged image ref as a job output for the deploy job
      - id: image
        name: Export image ref
        run: |
          echo "image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: build                  # only runs if build succeeds
    permissions:
      contents: read
      id-token: write
    #environment: production       # optional: adds a manual approval gate in GitHub

    steps:
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: 'projects/293105510394/locations/global/workloadIdentityPools/github-pool/providers/github-actions-provider'
          service_account: 'github-ci@bulq-testing-487417.iam.gserviceaccount.com'

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ needs.build.outputs.image }}   # sha-pinned, never deploys stale :latest